name: 🐧 构建 Linux 内核 (BBRv3/原版可选)

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 目标架构
        required: true
        default: x86_64
        type: choice
        options: [x86_64, arm64]
      enable_bbrv3:
        description: 集成 Google BBRv3 TCP 拥塞控制
        required: true
        default: true
        type: boolean
      compiler:
        description: 选择编译器
        required: true
        default: gcc-default
        type: choice
        options: [gcc-default, clang-19, llvm-latest]
      custom_suffix:
        description: 自定义版本后缀 (小写字母/数字，最多50字符)
        required: false
        default: ''
        type: string
      disable_unused_configs:
        description: 应用禁用配置 (disabled_kernel_configs.txt)
        required: true
        default: false
        type: boolean
      enable_custom_configs:
        description: 应用启用配置 (enabled_kernel_configs.txt)
        required: true
        default: false
        type: boolean
      enable_module_configs:
        description: 应用模块配置 (moduled_kernel_configs.txt)
        required: true
        default: false
        type: boolean
      cleanup_history:
        description: 清理历史工作流记录
        required: true
        default: false
        type: boolean
      cleanup_only:
        description: 仅执行清理，不构建
        required: true
        default: false
        type: boolean

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G

jobs:
  cleanup:
    name: 🧹 清理历史记录
    if: ${{ inputs.cleanup_history || inputs.cleanup_only }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: 删除旧记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 0

  build:
    name: 🔨 编译内核
    needs: cleanup
    if: ${{ !inputs.cleanup_only && (needs.cleanup.result == 'success' || needs.cleanup.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 验证输入参数
        run: |
          # 架构校验
          [[ "${{ inputs.arch }}" =~ ^(x86_64|arm64)$ ]] || { echo "::error::非法架构: ${{ inputs.arch }}"; exit 1; }

          # 编译器校验
          [[ "${{ inputs.compiler }}" =~ ^(gcc-default|clang-19|llvm-latest)$ ]] || { echo "::error::非法编译器: ${{ inputs.compiler }}"; exit 1; }

          # 自定义后缀校验
          SUFFIX="${{ inputs.custom_suffix }}"
          if [[ -n "$SUFFIX" ]]; then
            if [[ ${#SUFFIX} -gt 50 ]] || [[ ! "$SUFFIX" =~ ^[a-z0-9]+$ ]]; then
              echo "::error::自定义后缀格式错误或长度超过50字符"
              exit 1
            fi
          fi

          # 自定义配置文件存在性检查
          check_file() {
            if [[ "$1" == "true" && ! -f "$2" ]]; then
              echo "::error::缺少配置文件: $2"
              exit 1
            fi
          }
          check_file "${{ inputs.disable_unused_configs }}" "disabled_kernel_configs.txt"
          check_file "${{ inputs.enable_custom_configs }}" "enabled_kernel_configs.txt"
          check_file "${{ inputs.enable_module_configs }}" "moduled_kernel_configs.txt"

      - name: 生成构建标识
        run: |
          RAND=$(tr -dc 'a-z0-9' < /dev/urandom | head -c8) || exit 1
          echo "RAND_SUFFIX=$RAND" >> "$GITHUB_ENV"
          echo "BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_ENV"

      - name: 获取最新内核版本
        run: |
          for i in {1..5}; do
            VERSION=$(curl -fsSL https://www.kernel.org/releases.json | jq -r '.latest_stable.version' 2>/dev/null)
            [[ -n "$VERSION" && "$VERSION" != "null" ]] && break
            sleep 5
          done
          if [[ -z "$VERSION" ]]; then
            VERSION=$(curl -fsSL https://www.kernel.org | grep -A1 "stable:" | tail -1 | grep -oP '\d+\.\d+(\.\d+)?')
          fi
          [[ -n "$VERSION" ]] || { echo "::error::无法获取内核版本"; exit 1; }
          echo "KERNEL_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: 释放磁盘空间
        run: sudo rm -rf /usr/share/dotnet /opt/hostedtoolcache /usr/local/lib/android /usr/local/graalvm

      - name: 安装基础依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git build-essential ccache libncurses-dev libssl-dev libelf-dev \
            bison bc flex rsync debhelper dpkg-dev fakeroot kmod cpio dwarves lz4 zstd xz-utils \
            curl jq openssl initramfs-tools libdw-dev software-properties-common
          if [[ "${{ inputs.arch }}" == "arm64" ]]; then
            sudo apt-get install -y binutils-aarch64-linux-gnu libc6-dev-arm64-cross gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y

      - name: 配置编译器环境
        run: |
          ARCH="${{ inputs.arch }}"
          COMPILER="${{ inputs.compiler }}"
          echo "ARCH=$ARCH" >> "$GITHUB_ENV"

          case "$COMPILER" in
            gcc-default)
              GCC_VER=14
              if [[ "$ARCH" == "arm64" ]]; then
                echo "CC=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
                echo "CXX=aarch64-linux-gnu-g++" >> "$GITHUB_ENV"
                echo "CROSS_COMPILE=aarch64-linux-gnu-" >> "$GITHUB_ENV"
                echo "COMPILER_NAME=GCC (default)" >> "$GITHUB_ENV"
                echo "CACHE_KEY_COMPILER=gcc-default" >> "$GITHUB_ENV"
              else
                sudo apt-get install -y gcc-${GCC_VER} g++-${GCC_VER}
                echo "CC=gcc-${GCC_VER}" >> "$GITHUB_ENV"
                echo "CXX=g++-${GCC_VER}" >> "$GITHUB_ENV"
                echo "COMPILER_NAME=GCC ${GCC_VER}" >> "$GITHUB_ENV"
                echo "CACHE_KEY_COMPILER=gcc-${GCC_VER}" >> "$GITHUB_ENV"
              fi
              ;;
            clang-19)
              CLANG_VER=19
              wget -O /tmp/llvm.sh https://apt.llvm.org/llvm.sh || exit 1
              chmod +x /tmp/llvm.sh
              sudo /tmp/llvm.sh ${CLANG_VER} || exit 1
              sudo apt-get install -y clang-${CLANG_VER} lld-${CLANG_VER} llvm-${CLANG_VER} || exit 1
              if [[ "$ARCH" == "arm64" ]]; then
                echo "CC=clang-${CLANG_VER} --target=aarch64-linux-gnu" >> "$GITHUB_ENV"
                echo "CXX=clang++-${CLANG_VER} --target=aarch64-linux-gnu" >> "$GITHUB_ENV"
              else
                echo "CC=clang-${CLANG_VER} --target=x86_64-linux-gnu" >> "$GITHUB_ENV"
                echo "CXX=clang++-${CLANG_VER} --target=x86_64-linux-gnu" >> "$GITHUB_ENV"
              fi
              for tool in ar nm strip objcopy objdump readelf; do
                echo "${tool^^}=llvm-${tool}-${CLANG_VER}" >> "$GITHUB_ENV"
              done
              echo "MAKE_ARGS=LLVM=1 LLVM_IAS=1" >> "$GITHUB_ENV"
              echo "COMPILER_NAME=Clang ${CLANG_VER}" >> "$GITHUB_ENV"
              echo "CACHE_KEY_COMPILER=clang-${CLANG_VER}" >> "$GITHUB_ENV"
              echo "/usr/lib/llvm-${CLANG_VER}/bin" >> "$GITHUB_PATH"
              ;;
            llvm-latest)
              UBUNTU_VER=$(lsb_release -rs)
              LATEST_TAG=$(curl -s https://api.github.com/repos/llvm/llvm-project/releases/latest | jq -r .tag_name)
              [[ -n "$LATEST_TAG" ]] || { echo "::error::无法获取最新 LLVM 版本"; exit 1; }
              LATEST_VER=${LATEST_TAG#llvmorg-}
              MAJOR_VER=$(echo "$LATEST_VER" | cut -d. -f1)
              DOWNLOAD_URL="https://github.com/llvm/llvm-project/releases/download/${LATEST_TAG}/LLVM-${LATEST_VER}-Linux-X64.tar.xz"

              curl -L -o /tmp/llvm.tar.xz "$DOWNLOAD_URL" || { echo "::error::下载 LLVM tarball 失败"; exit 1; }

              mkdir -p /opt/llvm-latest
              tar -xJf /tmp/llvm.tar.xz -C /opt/llvm-latest --strip-components=1 || exit 1
              echo "/opt/llvm-latest/bin" >> "$GITHUB_PATH"

              if [[ "$ARCH" == "arm64" ]]; then
                echo "CC=clang --target=aarch64-linux-gnu" >> "$GITHUB_ENV"
                echo "CXX=clang++ --target=aarch64-linux-gnu" >> "$GITHUB_ENV"
              else
                echo "CC=clang --target=x86_64-linux-gnu" >> "$GITHUB_ENV"
                echo "CXX=clang++ --target=x86_64-linux-gnu" >> "$GITHUB_ENV"
              fi
              for tool in ar nm strip objcopy objdump readelf; do
                echo "${tool^^}=llvm-${tool}" >> "$GITHUB_ENV"
              done
              echo "MAKE_ARGS=LLVM=1 LLVM_IAS=1" >> "$GITHUB_ENV"
              echo "COMPILER_NAME=LLVM Latest (${MAJOR_VER})" >> "$GITHUB_ENV"
              echo "CACHE_KEY_COMPILER=llvm-latest-${MAJOR_VER}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: 配置 ccache
        run: |
          mkdir -p "$CCACHE_DIR"
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          ccache --set-config=max_size="$CCACHE_MAXSIZE" --set-config=compression=true

      - name: 恢复 ccache 缓存
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: kernel-cache-${{ env.KERNEL_VERSION }}-${{ inputs.enable_bbrv3 }}-${{ env.CACHE_KEY_COMPILER }}-${{ inputs.arch }}
          restore-keys: |
            kernel-cache-${{ env.KERNEL_VERSION }}-${{ inputs.enable_bbrv3 }}-${{ env.CACHE_KEY_COMPILER }}-
            kernel-cache-${{ env.KERNEL_VERSION }}-${{ inputs.enable_bbrv3 }}-
            kernel-cache-${{ env.KERNEL_VERSION }}-

      - name: 获取内核源码
        run: |
          mkdir -p kernel && cd kernel
          MINOR=$(echo "${{ env.KERNEL_VERSION }}" | grep -oP '^\d+\.\d+')
          if [[ "${{ inputs.enable_bbrv3 }}" == "true" ]]; then
            git clone --depth=1 -b v3 https://github.com/google/bbr.git linux || exit 1
            echo "SOURCE_TYPE=BBRv3" >> "$GITHUB_ENV"
            echo "FEATURE_TAG=With BBRv3" >> "$GITHUB_ENV"
          else
            git clone --depth=1 -b "linux-$MINOR.y" https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux || \
            git clone --depth=1 https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git linux || exit 1
            echo "SOURCE_TYPE=Stable" >> "$GITHUB_ENV"
            echo "FEATURE_TAG=Vanilla" >> "$GITHUB_ENV"
          fi

      - name: 修正内核版本号
        working-directory: kernel/linux
        run: |
          V=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f1)
          P=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f2)
          S=$(echo "${{ env.KERNEL_VERSION }}" | cut -d. -f3)
          sed -i "s/^VERSION *=.*/VERSION = $V/" Makefile
          sed -i "s/^PATCHLEVEL *=.*/PATCHLEVEL = $P/" Makefile
          [[ -n "$S" ]] && sed -i "s/^SUBLEVEL *=.*/SUBLEVEL = $S/" Makefile

      - name: 应用内核配置
        working-directory: kernel/linux
        run: |
          if [[ -f "${{ github.workspace }}/kernel.config" ]]; then
            cp "${{ github.workspace }}/kernel.config" .config
          else
            make ARCH=${{ env.ARCH }} defconfig
          fi
          scripts/config --disable SYSTEM_TRUSTED_KEYS --disable SYSTEM_REVOCATION_KEYS

          handle_config() {
            file="$1"; mode="$2"
            [[ ! -f "$file" ]] && return
            while read -r line; do
              [[ -z "$line" || "$line" != CONFIG_* ]] && continue
              case "$mode" in
                enable)  scripts/config --enable "$line" ;;
                disable) scripts/config --disable "$line" ;;
                module)  scripts/config --module "$line" ;;
              esac
            done < "$file"
          }

          handle_config "${{ github.workspace }}/disabled_kernel_configs.txt" "disable"
          handle_config "${{ github.workspace }}/moduled_kernel_configs.txt" "module"
          handle_config "${{ github.workspace }}/enabled_kernel_configs.txt" "enable"

          make ARCH=${{ env.ARCH }} olddefconfig ${{ env.MAKE_ARGS }}
          mkdir -p ../configs && cp .config ../configs/final_build.config

      - name: 设置 Debian 包架构
        run: |
          if [[ "${{ inputs.arch }}" == "x86_64" ]]; then
            echo "DEB_HOST_ARCH=amd64" >> "$GITHUB_ENV"
          else
            echo "DEB_HOST_ARCH=arm64" >> "$GITHUB_ENV"
          fi

      - name: 编译内核
        working-directory: kernel/linux
        timeout-minutes: 340
        run: |
          LOCAL_VER=""
          [[ "${{ inputs.enable_bbrv3 }}" == "true" ]] && LOCAL_VER+="-bbrv3"
          LOCAL_VER+="-${{ env.CACHE_KEY_COMPILER }}"
          [[ -n "${{ inputs.custom_suffix }}" ]] && LOCAL_VER+="-${{ inputs.custom_suffix }}"
          LOCAL_VER+="-${{ env.RAND_SUFFIX }}"

          make clean
          make ARCH=${{ env.ARCH }} CROSS_COMPILE=${{ env.CROSS_COMPILE }} bindeb-pkg -j$(nproc) \
            LOCALVERSION="$LOCAL_VER" ${{ env.MAKE_ARGS }} 2>&1 | tee ../build.log || {
              tail -50 ../build.log
              echo "::error::内核编译失败，请查看 build.log"
              exit 1
            }

      - name: 保存 ccache 缓存
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: kernel-cache-${{ env.KERNEL_VERSION }}-${{ inputs.enable_bbrv3 }}-${{ env.CACHE_KEY_COMPILER }}-${{ inputs.arch }}

      - name: 校验编译产物
        working-directory: kernel
        run: |
          ls *.deb &>/dev/null || { echo "::error::未生成任何 .deb 包"; exit 1; }
          for deb in *.deb; do
            size=$(stat -c%s "$deb")
            [[ $size -ge 102400 ]] || echo "::warning::$deb 文件过小 ($size bytes)"
          done

      - name: 生成 checksum
        working-directory: kernel
        run: sha256sum *.deb > checksums.txt

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ env.KERNEL_VERSION }}-${{ env.RAND_SUFFIX }}-${{ env.DEB_HOST_ARCH }}
          path: |
            kernel/*.deb
            kernel/build.log
            kernel/configs/
            kernel/checksums.txt
          retention-days: 5

      - name: 发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.KERNEL_VERSION }}${{ env.CACHE_KEY_COMPILER != '' && format('-{0}', env.CACHE_KEY_COMPILER) || '' }}-${{ env.RAND_SUFFIX }}-${{ env.DEB_HOST_ARCH }}
          name: Linux ${{ env.KERNEL_VERSION }} ${{ env.FEATURE_TAG }} [${{ env.RAND_SUFFIX }}] (${{ env.DEB_HOST_ARCH }})
          files: |
            kernel/*.deb
            kernel/configs/final_build.config
            kernel/checksums.txt
          body: |
            ## Linux Kernel ${{ env.KERNEL_VERSION }} 构建

            **架构**: ${{ inputs.arch }} (Debian ${{ env.DEB_HOST_ARCH }})
            **源码**: ${{ env.SOURCE_TYPE }}
            **BBRv3**: ${{ inputs.enable_bbrv3 && '是' || '否' }}
            **编译器**: ${{ env.COMPILER_NAME }}
            **随机标识**: ${{ env.RAND_SUFFIX }}

            ### 安装方式
            ```bash
            sha256sum -c checksums.txt
            sudo apt install ./linux-image-*.deb ./linux-headers-*.deb
            sudo reboot
            ```
