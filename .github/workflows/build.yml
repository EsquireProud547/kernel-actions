# =============================================================================
# 工作流名称：Linux 内核自动化构建系统 (x86_64)
# 版本：2.0
# 核心功能：自动化编译 x86_64 架构 Linux 内核，生成 .deb 安装包
# 支持分支：主线 (Mainline) / 稳定版 (Stable) / 长期支持版 (LTS)
# 编译器支持：GCC-14 / LLVM (自动获取最新稳定版)
# =============================================================================

name: 🐧 Linux 内核构建 (x86_64)

on:
  workflow_dispatch:
    inputs:
      compiler:
        description: '🛠️ 编译器选择'
        required: true
        default: 'gcc-default'
        type: choice
        options:
          - gcc-default    # GCC-14 (Ubuntu 官方仓库)
          - llvm-latest    # 最新稳定版 LLVM/Clang (通过 GitHub API 自动探测)
      
      kernel_branch:
        description: '🌿 内核源码分支'
        required: true
        default: 'stable'
        type: choice
        options:
          - mainline       # 主线开发版 (RC)
          - stable         # 最新稳定版
          - longterm-6.12  # LTS 6.12.x
          - longterm-6.6   # LTS 6.6.x
          - longterm-6.1   # LTS 6.1.x
          - longterm-5.15  # LTS 5.15.x
          - longterm-5.10  # LTS 5.10.x
      
      disable_unused_configs:
        description: '❌ 禁用配置 (disabled_kernel_configs.txt)'
        required: true
        default: false
        type: boolean
      
      enable_custom_configs:
        description: '✅ 启用配置 (enabled_kernel_configs.txt)'
        required: true
        default: false
        type: boolean
      
      enable_module_configs:
        description: '🧩 模块配置 (moduled_kernel_configs.txt)'
        required: true
        default: false
        type: boolean
      
      cleanup_history:
        description: '🧹 清理历史工作流记录'
        required: true
        default: false
        type: boolean
      
      cleanup_only:
        description: '⚠️ 仅执行清理 (跳过构建)'
        required: true
        default: false
        type: boolean

# 全局环境变量
env:
  CCACHE_DIR: /home/runner/.ccache
  CCACHE_MAXSIZE: 2G
  ARCH: x86_64
  # 禁用 GitHub API 默认令牌泄露风险（仅用于清理作业时需要）
  # GITHUB_TOKEN 由 Actions 自动注入，此处不重复定义

jobs:
  # ===========================================================================
  # 作业 1: 历史记录清理
  # 触发条件: 用户选择 cleanup_history 或 cleanup_only
  # ===========================================================================
  cleanup:
    name: 🧹 清理历史记录
    if: ${{ inputs.cleanup_history || inputs.cleanup_only }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: 删除旧工作流运行记录
        uses: Mattraks/delete-workflow-runs@main
        with:
          retain_days: 0
          keep_minimum_runs: 1  # 保留最新一条避免误删当前运行

  # ===========================================================================
  # 作业 2: 内核编译主流程
  # 依赖: cleanup 作业完成（无论成功与否，只要不是被 cleanup_only 跳过）
  # ===========================================================================
  build:
    name: 🔨 编译内核 (${{ inputs.kernel_branch }})
    needs: cleanup
    if: ${{ always() && !inputs.cleanup_only && (needs.cleanup.result == 'success' || needs.cleanup.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write  # 用于发布 Release
    
    outputs:
      kernel_version: ${{ steps.kernel-version.outputs.version }}
      compiler_info: ${{ steps.compiler-setup.outputs.info }}
    
    steps:
      # -----------------------------------------------------------------------
      # 步骤 1: 检出仓库代码
      # -----------------------------------------------------------------------
      - name: 📥 检出仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 仅获取最新提交，节省带宽

      # -----------------------------------------------------------------------
      # 步骤 2: 参数校验与预处理
      # 检查配置文件是否存在，生成随机构建标识
      # -----------------------------------------------------------------------
      - name: 🔍 参数与环境校验
        run: |
          set -euo pipefail
          
          # 配置文件存在性检查函数
          check_file() {
            local enabled="$1"
            local filepath="$2"
            
            if [[ "$enabled" == "true" && ! -f "$filepath" ]]; then
              echo "::error::配置开关已启用，但缺少必要的配置文件: $filepath"
              exit 1
            fi
          }
          
          check_file "${{ inputs.disable_unused_configs }}" "disabled_kernel_configs.txt"
          check_file "${{ inputs.enable_custom_configs }}" "enabled_kernel_configs.txt"
          check_file "${{ inputs.enable_module_configs }}" "moduled_kernel_configs.txt"
          
          # 生成 8 位随机后缀（小写字母+数字），用于构建标识和版本命名
          RAND_SUFFIX=$(tr -dc 'a-z0-9' < /dev/urandom | head -c8)
          echo "RAND_SUFFIX=$RAND_SUFFIX" >> "$GITHUB_ENV"
          echo "✅ 环境校验通过，构建标识: $RAND_SUFFIX"

      # -----------------------------------------------------------------------
      # 步骤 3: 获取最新内核版本号 (多重容错机制)
      # 数据源: https://www.kernel.org/releases.json (官方 API)
      # 修复点: 增加分支存在性校验、null 值处理、降级策略
      # -----------------------------------------------------------------------
      - name: 🌐 获取内核版本号
        id: kernel-version
        run: |
          set -euo pipefail
          
          BRANCH="${{ inputs.kernel_branch }}"
          API_URL="https://www.kernel.org/releases.json"
          
          echo "📡 正在从 kernel.org 获取分支 [$BRANCH] 的最新版本..."
          
          # 下载 API 数据（带重试机制）
          for i in {1..3}; do
            if RELEASES_JSON=$(curl -fsSL --retry 3 --retry-delay 2 "$API_URL"); then
              break
            fi
            echo "⚠️ 第 $i 次尝试获取版本信息失败，等待重试..."
            sleep 5
          done
          
          if [[ -z "${RELEASES_JSON:-}" ]]; then
            echo "::error::无法连接到 kernel.org API，请检查网络或稍后重试"
            exit 1
          fi
          
          # 根据分支解析版本号
          case "$BRANCH" in
            mainline)
              # mainline 没有 latest_mainline 字段，需从 releases 数组筛选
              # 选择 moniker 为 mainline 的第一个版本（按发布时间排序）
              VERSION=$(echo "$RELEASES_JSON" | jq -r '[.releases[] | select(.moniker=="mainline")] | first | .version')
              ;;
            
            stable)
              # 稳定版使用专用字段
              VERSION=$(echo "$RELEASES_JSON" | jq -r '.latest_stable.version')
              ;;
            
            longterm-*)
              # LTS 版本: 提取分支基础版本号 (如 6.12)
              BASE_VER="${BRANCH#longterm-}"
              # 先筛选所有 longterm，再用 grep 匹配版本前缀，最后取最新
              VERSION=$(echo "$RELEASES_JSON" | jq -r '[.releases[] | select(.moniker=="longterm" and (.version | startswith("'"$BASE_VER"'")))] | first | .version')
              ;;
            
            *)
              echo "::error::未知的分支类型: $BRANCH"
              exit 1
              ;;
          esac
          
          # 校验结果有效性
          if [[ -z "$VERSION" || "$VERSION" == "null" || "$VERSION" == "undefined" ]]; then
            echo "::error::无法解析版本号！分支 [$BRANCH] 可能不存在或无可用版本"
            echo "API 返回结构:"
            echo "$RELEASES_JSON" | jq '.releases[:3]' || echo "(无法解析 JSON)"
            exit 1
          fi
          
          # 校验版本号格式 (x.y.z 或 x.y)
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::获取到的版本号格式异常: $VERSION"
            exit 1
          fi
          
          echo "KERNEL_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "✅ 成功获取目标版本: Linux $VERSION"

      # -----------------------------------------------------------------------
      # 步骤 4: 磁盘空间清理
      # 清理不必要的预装软件，为内核源码和编译产物腾出空间 (~30GB)
      # -----------------------------------------------------------------------
      - name: 🧹 清理磁盘空间
        run: |
          echo "🗑️ 正在清理磁盘空间..."
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/graalvm
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo apt-get autoremove -y
          echo "✅ 磁盘空间清理完成"
          df -h /

      # -----------------------------------------------------------------------
      # 步骤 5: 安装系统依赖
      # -----------------------------------------------------------------------
      - name: 📦 安装构建依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git build-essential ccache libncurses-dev libssl-dev libelf-dev \
            bison bc flex rsync debhelper dpkg-dev fakeroot kmod cpio dwarves \
            lz4 zstd xz-utils curl jq openssl initramfs-tools libdw-dev \
            software-properties-common wget ca-certificates gnupg lsb-release

      # -----------------------------------------------------------------------
      # 步骤 6: 编译器配置 (核心修复)
      # GCC: 使用 Ubuntu Toolchain PPA 安装 GCC-14
      # LLVM: 通过 GitHub API 获取最新稳定版本，使用官方 llvm.sh 安装
      # 修复点: 原网页 grep 方式获取 LLVM 版本已失效，改用 GitHub Releases API
      # -----------------------------------------------------------------------
      - name: 🛠️ 配置编译器环境
        id: compiler-setup
        run: |
          set -euo pipefail
          
          COMPILER="${{ inputs.compiler }}"
          
          if [[ "$COMPILER" == "gcc-default" ]]; then
            echo "🔧 配置 GCC-14 编译环境..."
            
            # 添加 Ubuntu Toolchain PPA
            sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
            sudo apt-get update -qq
            sudo apt-get install -y gcc-14 g++-14
            
            # 设置环境变量
            {
              echo "CC=gcc-14"
              echo "CXX=g++-14"
              echo "COMPILER_NAME=GCC 14"
              echo "CACHE_KEY_COMPILER=gcc-14"
              echo "MAKE_ARGS="
            } >> "$GITHUB_ENV"
            
            echo "info=GCC 14" >> "$GITHUB_OUTPUT"
            echo "✅ GCC-14 配置完成"
            
          elif [[ "$COMPILER" == "llvm-latest" ]]; then
            echo "🔧 探测并安装最新 LLVM/Clang..."
            
            # [核心修复] 使用 GitHub Releases API 获取最新 LLVM 版本
            # 原方法: curl -sS https://apt.llvm.org/ | grep -oP 'LLVM \K[0-9]+'
            # 问题: 网页内容变化导致抓取失效，当前仍返回 18 而非 22
            # 解决: 直接查询 GitHub API 获取最新 release tag (如 llvmorg-22.1.2)
            
            LLVM_TAG=$(curl -sL \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/llvm/llvm-project/releases/latest" | \
              jq -r '.tag_name')
            
            if [[ -z "$LLVM_TAG" || "$LLVM_TAG" == "null" ]]; then
              echo "::warning::GitHub API 获取失败，使用备用方案 (固定版本 22)"
              LLVM_VER=22
            else
              # 提取主版本号 (22.1.2 -> 22)
              LLVM_VER=$(echo "$LLVM_TAG" | sed -E 's/llvmorg-//;s/-.*//;s/\.[0-9]+$//;s/\.[0-9]+$//')
              
              # 校验版本号有效性 (数字检查)
              if [[ ! "$LLVM_VER" =~ ^[0-9]+$ ]]; then
                echo "::warning::解析版本号异常 ($LLVM_TAG -> $LLVM_VER)，使用默认版本 22"
                LLVM_VER=22
              fi
            fi
            
            echo "📦 正在安装 LLVM $LLVM_VER (来源: GitHub latest release $LLVM_TAG)..."
            
            # 使用官方 llvm.sh 脚本安装指定版本
            # 脚本特性: 自动配置仓库、导入 GPG 密钥、处理依赖关系
            wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
            chmod +x /tmp/llvm.sh
            
            # 执行安装 (非交互模式，自动接受仓库配置)
            sudo bash /tmp/llvm.sh "$LLVM_VER" all
            
            # 安装内核编译所需的额外 LLVM 组件
            sudo apt-get install -y \
              clang-"$LLVM_VER" \
              lld-"$LLVM_VER" \
              llvm-"$LLVM_VER" \
              clang-tools-"$LLVM_VER" \
              clangd-"$LLVM_VER"
            
            # 设置内核编译环境变量
            # LLVM=-<version> 是内核 Makefile 原生支持的方式，会自动查找 clang-22, ld.lld-22 等
            {
              echo "COMPILER_NAME=LLVM ${LLVM_VER}"
              echo "CACHE_KEY_COMPILER=llvm-${LLVM_VER}"
              echo "MAKE_ARGS=LLVM=-${LLVM_VER} LLVM_IAS=-${LLVM_VER}"
            } >> "$GITHUB_ENV"
            
            echo "info=LLVM ${LLVM_VER}" >> "$GITHUB_OUTPUT"
            echo "✅ LLVM $LLVM_VER 配置完成 (基于 $LLVM_TAG)"
            
          else
            echo "::error::未知编译器选项: $COMPILER"
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 步骤 7: ccache 配置
      # 加速原理: 缓存编译中间结果，相同代码避免重复编译
      # -----------------------------------------------------------------------
      - name: ⚡ 配置 ccache 缓存
        run: |
          mkdir -p "$CCACHE_DIR"
          echo "/usr/lib/ccache" >> "$GITHUB_PATH"
          
          ccache --set-config=max_size="$CCACHE_MAXSIZE"
          ccache --set-config=compression=true
          ccache --set-config=sloppiness=include_file_mtime,time_macros
          ccache --zero-stats
          
          echo "📊 ccache 统计:"
          ccache -s

      # -----------------------------------------------------------------------
      # 步骤 8: 恢复 ccache 缓存（从之前的构建）
      # 缓存键设计: kernel-{版本}-{编译器}-{架构}
      # -----------------------------------------------------------------------
      - name: ♻️ 恢复编译缓存
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: kernel-${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-x86_64-${{ github.run_id }}
          restore-keys: |
            kernel-${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-x86_64-
            kernel-${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-
            kernel-${{ env.KERNEL_VERSION }}-

      # -----------------------------------------------------------------------
      # 步骤 9: 下载 Linux 内核源码
      # 策略: 使用浅克隆 (--depth=1) 节省时间和空间，直接切换到目标 tag
      # 仓库选择: mainline -> torvalds/linux, 其他 -> stable/linux
      # -----------------------------------------------------------------------
      - name: 📥 克隆内核源码
        run: |
          set -euo pipefail
          
          mkdir -p kernel
          BRANCH="${{ inputs.kernel_branch }}"
          VERSION="${{ env.KERNEL_VERSION }}"
          
          # 根据分支选择正确的 Git 仓库
          if [[ "$BRANCH" == "mainline" ]]; then
            REPO="https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git"
            echo "🌿 使用主线仓库 (torvalds/linux)"
          else
            REPO="https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git"
            echo "🌿 使用稳定版仓库 (stable/linux)"
          fi
          
          echo "📦 正在克隆 Linux $VERSION (标签: v$VERSION)..."
          
          # 浅克隆指定标签 (--depth=1 仅下载最新快照，节省约 90% 时间和空间)
          git clone --depth=1 -b "v$VERSION" "$REPO" kernel/linux
          
          # 验证检出
          cd kernel/linux
          ACTUAL_VER=$(make kernelversion 2>/dev/null || echo "未知")
          echo "✅ 源码就绪，Makefile 报告版本: $ACTUAL_VER"

      # -----------------------------------------------------------------------
      # 步骤 10: 内核配置生成 (.config)
      # 流程: 基础配置 -> 禁用冲突选项 -> 应用自定义配置 -> 依赖解析
      # -----------------------------------------------------------------------
      - name: ⚙️ 生成内核配置
        working-directory: kernel/linux
        run: |
          set -euo pipefail
          
          echo "🔧 正在生成内核配置..."
          
          # 1. 基础配置来源
          if [[ -f "${{ github.workspace }}/kernel.config" ]]; then
            echo "📄 使用用户提供的 kernel.config 作为基础"
            cp "${{ github.workspace }}/kernel.config" .config
          else
            echo "📄 使用 x86_64 默认配置 (defconfig)"
            make ARCH=x86_64 defconfig
          fi
          
          # 2. 关键兼容性修复 (避免常见编译失败)
          echo "🛡️ 应用兼容性补丁..."
          # 禁用证书验证: GitHub Actions 环境缺少内核编译默认的证书文件
          scripts/config --disable SYSTEM_TRUSTED_KEYS
          scripts/config --disable SYSTEM_REVOCATION_KEYS
          # 禁用 BTF debug 信息: 需要 pahole 特定版本，易引发工具链不匹配
          scripts/config --disable DEBUG_INFO_BTF
          
          # 3. 用户自定义配置注入函数
          apply_config() {
            local file="$1"
            local mode="$2"
            
            [[ ! -f "$file" ]] && return
            
            echo "📋 应用配置 ($mode): $(basename "$file")"
            local count=0
            
            while IFS= read -r line || [[ -n "$line" ]]; do
              # 跳过空行和注释
              [[ -z "$line" || "$line" =~ ^[[:space:]]*# ]] && continue
              
              # 提取配置名 (处理 CONFIG_XXX=y/m/ 格式)
              local config_name=""
              if [[ "$line" =~ ^CONFIG_[A-Za-z0-9_]+ ]]; then
                config_name=$(echo "$line" | grep -oE '^CONFIG_[A-Za-z0-9_]+')
              else
                continue
              fi
              
              [[ -z "$config_name" ]] && continue
              
              case "$mode" in
                enable)  
                  scripts/config --enable "$config_name" && ((count++))
                  ;;
                disable) 
                  scripts/config --disable "$config_name" && ((count++))
                  ;;
                module)  
                  scripts/config --module "$config_name" && ((count++))
                  ;;
              esac
            done < "$file"
            
            echo "   └─ 已应用 $count 项配置"
          }
          
          # 4. 依次应用三类配置（顺序重要: disable -> module -> enable）
          apply_config "${{ github.workspace }}/disabled_kernel_configs.txt" "disable"
          apply_config "${{ github.workspace }}/moduled_kernel_configs.txt" "module"
          apply_config "${{ github.workspace }}/enabled_kernel_configs.txt" "enable"
          
          # 5. 解决配置依赖并生成最终 .config
          echo "🔄 解析配置依赖关系..."
          make ARCH=x86_64 olddefconfig ${{ env.MAKE_ARGS }} 2>&1 | head -20
          
          # 6. 保存配置副本用于调试
          mkdir -p ../configs
          cp .config ../configs/final.config
          echo "💾 最终配置已保存至 kernel/configs/final.config"
          
          # 7. 配置摘要
          echo "📊 配置摘要:"
          grep -c "^CONFIG_" .config || echo "无法统计"
          grep -c "=y" .config || echo "0"
          grep -c "=m" .config || echo "0"

      # -----------------------------------------------------------------------
      # 步骤 11: 编译内核
      # 目标: bindeb-pkg (生成 Debian 安装包)
      # 参数说明:
      #   - bindeb-pkg: 构建 deb 包
      #   - -j$(nproc): 并行编译，使用所有 CPU 核心
      #   - LOCALVERSION: 自定义版本后缀（标识编译器和构建）
      # -----------------------------------------------------------------------
      - name: 🚀 编译内核
        working-directory: kernel/linux
        timeout-minutes: 340
        run: |
          set -eo pipefail
          
          echo "🧹 清理旧编译产物..."
          make clean 2>/dev/null || true
          
          echo "🔨 开始编译:"
          echo "   版本: Linux ${{ env.KERNEL_VERSION }}"
          echo "   编译器: ${{ env.COMPILER_NAME }}"
          echo "   并行任务: $(nproc) 线程"
          echo "   本地版本后缀: -${{ env.CACHE_KEY_COMPILER }}-${{ env.RAND_SUFFIX }}"
          
          # 执行编译
          if ! make ARCH=x86_64 bindeb-pkg \
            -j$(nproc) \
            LOCALVERSION="-${{ env.CACHE_KEY_COMPILER }}-${{ env.RAND_SUFFIX }}" \
            ${{ env.MAKE_ARGS }} \
            CC="${CC:-gcc}" \
            CXX="${CXX:-g++}" \
            2>&1 | tee ../build.log; then
            echo "::error::编译失败，查看日志："
            tail -n 200 ../build.log
            exit 1
          fi

      # -----------------------------------------------------------------------
      # 步骤 12: 保存 ccache 缓存
      # -----------------------------------------------------------------------
      - name: 💾 保存编译缓存
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: kernel-${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-x86_64-${{ github.run_id }}
          # 注意: restore-keys 在保存时不需要，仅用于 restore 步骤

      # -----------------------------------------------------------------------
      # 步骤 13: 产物校验与元数据生成
      # -----------------------------------------------------------------------
      - name: 🛡️ 校验构建产物
        working-directory: kernel
        run: |
          set -euo pipefail
          
          echo "🔍 检查构建产物..."
          
          # 检查 deb 包存在性
          if ! ls *.deb >/dev/null 2>&1; then
            echo "::error::未找到任何 .deb 构建产物！"
            ls -la
            exit 1
          fi
          
          # 生成 SHA256 校验和
          echo "📋 生成校验和..."
          sha256sum *.deb > checksums.txt
          
          # 生成构建元数据
          {
            echo "BUILD_DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo "KERNEL_VERSION=${{ env.KERNEL_VERSION }}"
            echo "COMPILER=${{ env.COMPILER_NAME }}"
            echo "BRANCH=${{ inputs.kernel_branch }}"
            echo "BUILD_ID=${{ env.RAND_SUFFIX }}"
          } > build-metadata.txt
          
          echo "✅ 产物校验完成:"
          cat checksums.txt | while read line; do
            echo "   ✓ $line"
          done

      # -----------------------------------------------------------------------
      # 步骤 14: 上传构建产物到 Artifacts
      # 保留 7 天，包含 deb 包、日志、配置、校验和
      # -----------------------------------------------------------------------
      - name: 📤 上传 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-amd64-${{ env.RAND_SUFFIX }}
          path: |
            kernel/*.deb
            kernel/build.log
            kernel/configs/
            kernel/checksums.txt
            kernel/build-metadata.txt
          retention-days: 7
          compression-level: 6
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # 步骤 15: 发布 GitHub Release
      # 仅在编译成功时执行，提供用户友好的下载和安装说明
      # -----------------------------------------------------------------------
      - name: 🎉 发布 Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.KERNEL_VERSION }}-${{ env.CACHE_KEY_COMPILER }}-${{ env.RAND_SUFFIX }}
          name: Linux ${{ env.KERNEL_VERSION }} (${{ inputs.kernel_branch }}) - ${{ env.COMPILER_NAME }}
          files: |
            kernel/*.deb
            kernel/configs/final.config
            kernel/checksums.txt
            kernel/build-metadata.txt
          body: |
            ## 🐧 Linux Kernel ${{ env.KERNEL_VERSION }} 构建完成
            
            | 属性 | 值 |
            |------|-----|
            | **架构** | x86_64 (amd64) |
            | **源码分支** | `${{ inputs.kernel_branch }}` |
            | **编译器** | ${{ env.COMPILER_NAME }} |
            | **构建标识** | `${{ env.RAND_SUFFIX }}` |
            | **构建时间** | ${{ github.event.repository.updated_at }} |
            
            ### 📦 安装指南
            
            ```bash
            # 1. 下载 deb 包和校验文件
            # 2. 验证文件完整性
            sha256sum -c checksums.txt
            
            # 3. 安装内核及头文件（必须同时安装）
            sudo dpkg -i linux-image-*.deb linux-headers-*.deb
            
            # 4. 更新引导加载器 (通常 dpkg 会自动处理)
            sudo update-grub2  # Debian/Ubuntu 系统
            # 或
            sudo grub2-mkconfig -o /boot/grub2/grub.cfg  # RHEL/CentOS/Fedora
            
            # 5. 重启系统
            sudo reboot
            ```
            
            ### 📝 构建信息
            
            - 基于 Git 标签: `v${{ env.KERNEL_VERSION }}`
            - 配置文件: 参见 `final.config` (Artifacts 中下载)
            - 完整构建日志: 参见 `build.log`
            
            ### ⚠️ 注意事项
            
            - 安装前建议备份重要数据
            - 如遇启动失败，请在启动菜单选择旧版本内核进入 Recovery Mode
            - 本构建使用 `${{ env.CC:-gcc }}` 编译器，与系统默认 GCC 可能存在差异
          generate_release_notes: false
          fail_on_unmatched_files: true
